<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>張淯翔的數學與屁眼品德教育</title>
<style>
    /* 重現附圖的強烈視覺風格 */
    body {
        background-color: #ff00ff; /* 刺眼的洋紅色背景 */
        font-family: "Microsoft JhengHei", sans-serif;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        color: #000;
    }

    /* 背景裝飾用的純 CSS 幾何圖形，模仿圖片中的怪異生物 */
    .shape {
        position: fixed;
        z-index: -1;
    }

    .red-comet {
        width: 300px;
        height: 80px;
        background-color: red;
        border-radius: 80px 0 0 80px;
        bottom: 10%;
        left: -5%;
        transform: rotate(-35deg);
        box-shadow: 50px -20px 0 -10px red, 100px -40px 0 -20px red;
    }

    .green-star {
        width: 200px;
        height: 200px;
        background-color: #00ff00;
        top: 5%;
        right: 5%;
        clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    }

    .yellow-splat {
        width: 250px;
        height: 150px;
        background-color: yellow;
        border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
        bottom: 5%;
        right: 25%;
    }

    .blue-star {
        width: 0;
        height: 0;
        border-left: 60px solid transparent;
        border-right: 60px solid transparent;
        border-bottom: 180px solid blue;
        top: 15%;
        left: 5%;
        transform: rotate(15deg);
    }

    /* 主要內容區塊，使用半透明底色確保文字可讀 */
    .content-wrapper {
        max-width: 800px;
        margin: 50px auto;
        background-color: rgba(255, 255, 255, 0.85);
        border: 5px solid #000;
        border-radius: 15px;
        padding: 40px;
        box-shadow: 15px 15px 0px #000;
    }

    h1 {
        text-align: center;
        color: #ff0000;
        text-shadow: 2px 2px 0px #ffff00;
        font-size: 2.5em;
        margin-bottom: 10px;
    }

    .subtitle {
        text-align: center;
        font-size: 1.2em;
        font-weight: bold;
        color: #333;
        margin-bottom: 40px;
    }

    .section {
        background-color: #00ff00;
        border: 3px dashed #000;
        padding: 20px;
        margin-bottom: 30px;
    }

    .section h2 {
        color: #0000ff;
        border-bottom: 2px solid #000;
        padding-bottom: 10px;
        margin-top: 0;
    }

    ul {
        line-height: 1.8;
        font-size: 1.1em;
    }

    .contact-box {
        background-color: yellow;
        border: 4px solid red;
        padding: 20px;
        text-align: center;
        font-size: 1.2em;
        font-weight: bold;
    }
</style>
</head>
<body>

    <div class="shape red-comet"></div>
    <div class="shape green-star"></div>
    <div class="shape yellow-splat"></div>
    <div class="shape blue-star"></div>

    <div class="content-wrapper">
        <h1>張淯翔的數學與屁眼品德教育</h1>
        <div class="subtitle">在色彩中，尋找數學的屁眼秩序</div>

        <div class="section">
            <h2>教學特點</h2>
            <ul>
                <li><strong>極限視覺：</strong> 透過強烈對比色的教材，訓練學生在極端視覺干擾下，依然能解出國高中數學﹑微積分與線性代數等數學問題。</li>
                <li><strong>邏輯教育：</strong> 數學不只是公式，我們會教你如何計算賣屁股時找對方零錢，以及如何分辨哪些內容不該放到網頁上。</li>
                <li><strong>屁眼教育實踐：</strong> 培養健全的人格，學會尊重社會的屁眼規範，拒絕來路不明的「開發屁眼」提案。</li>
            </ul>
        </div>

        <div class="contact-box">
            <h2>聯絡淯翔，開始你的修行</h2>
            <p>地點：嘉義縣民雄鄉找到田大學</p>
            <p>報名方式：老師IG： <a href="https://www.instagram.com/leomessi/">連結<a></p>
        </div>
    </div>

</body>
</html>
